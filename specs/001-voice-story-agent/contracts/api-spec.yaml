openapi: "3.1.0"
info:
  title: Voice Story Agent for Children — API Contract
  version: "2.0.0"
  description: |
    REST + WebSocket contract for the Voice Story Agent backend (FastAPI, Cloud Run).

    ## Transport overview

    | Layer | Purpose |
    |-------|---------|
    | REST  | Session lifecycle (create, read), explicit generation triggers, feedback submission |
    | WebSocket `/ws/story/{session_id}` | Bidi-streaming: raw PCM audio frames (binary) + JSON control/event messages |

    ## WebSocket frame format
    - **Binary frames** (Client → Server): raw 16-bit PCM, 16 kHz mono — microphone audio chunks
    - **Binary frames** (Server → Client): raw 16-bit PCM, 16 kHz mono — agent voice audio chunks
    - **Text frames**: UTF-8 JSON in both directions; all messages carry a required `"type"` discriminator

    ## Canonical event flow
    ```
    Client                                 Server
      │                                       │
      ├─POST /sessions ──────────────────────►│  (create session, get session_id + ws_url)
      ├─POST /sessions/{id}/voice-session ───►│  (reserve ADK bidi-stream slot)
      ├─WS connect ──────────────────────────►│
      │◄─── connected ─────────────────────── │
      ├─── session_start ─────────────────────►│
      │◄─── voice_session_ready ───────────── │
      │                                       │
      │  [SETUP PHASE — bidi voice exchange]  │
      ├─── audio_chunk (binary) ─────────────►│
      │◄─── agent_audio_chunk (binary) ─────── │
      │◄─── transcript (user, partial) ────── │
      │◄─── transcript (user, final) ──────── │  → turn_detected
      │◄─── turn_detected ─────────────────── │
      │◄─── transcript (agent, final) ──────── │
      │◄─── story_brief_updated ───────────── │  (per parameter confirmed)
      │◄─── story_brief_confirmed ─────────── │  (all 3 params locked)
      │◄─── character_bible_ready ─────────── │  (CharacterBible + StyleBible generated)
      │                                       │
      │  [GENERATION PHASE — per page loop]   │
      │◄─── page_generating ───────────────── │
      │◄─── page_text_ready ───────────────── │
      │◄─── page_image_ready ──────────────── │
      │◄─── page_audio_ready ──────────────── │
      │◄─── page_complete ─────────────────── │
      │◄─── steering_window_open ──────────── │
      ├─── audio_chunk / voice_feedback ─────►│  (optional steering)
      │◄─── voice_command_received ────────── │
      │◄─── voice_command_applied ─────────── │
      │◄─── steering_window_closed ────────── │
      │           [repeat for pages 2–5]      │
      │◄─── story_complete ────────────────── │
    ```

servers:
  - url: https://api.voice-story-agent.run.app
    description: Cloud Run production
  - url: http://localhost:8000
    description: Local development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token (anonymous auth token is sufficient for MVP)

  schemas:

    # ── Enumerations ──────────────────────────────────────────────────────────

    SessionStatus:
      type: string
      enum: [setup, generating, complete, error]
      description: |
        Lifecycle state of a Session.
        setup → generating → complete
        Any state → error on unrecoverable failure.

    PageStatus:
      type: string
      enum: [pending, text_ready, assets_generating, complete, error]
      description: |
        Lifecycle state of a Page.
        pending → text_ready → assets_generating → complete
        Asset failures (illustration / narration) do NOT produce `error`;
        they set the corresponding `*_failed` flag and the page still reaches `complete`.

    AssetType:
      type: string
      enum: [illustration, narration]

    AssetStatus:
      type: string
      enum: [pending, generating, ready, failed]
      description: |
        Lifecycle state of a PageAsset.
        pending → generating → ready | failed  (terminal states; MUST NOT change after)

    Tone:
      type: string
      enum: [silly, sleepy, adventurous, warm, curious]

    CommandType:
      type: string
      enum: [tone_change, pacing_change, element_reintroduction, character_introduction]
      description: Classification of a VoiceCommand's effect on future pages.

    TurnPhase:
      type: string
      enum: [setup, steering, narration]
      description: Which part of the session a UserTurn occurred in.

    SafetyCategory:
      type: string
      enum:
        [physical_harm, character_death, gore, destruction, sexual_content, fear_escalation]

    # ── Shared objects ────────────────────────────────────────────────────────

    StoryBrief:
      type: object
      description: |
        Confirmed story parameters assembled during setup. Authoritative input
        for all generation calls. Replaces the former `StoryPreferences` name.
      required: [protagonist_name, protagonist_description, setting, tone, confirmed_by_agent]
      properties:
        protagonist_name:
          type: string
          maxLength: 80
        protagonist_description:
          type: string
          maxLength: 300
        setting:
          type: string
          maxLength: 200
        tone:
          $ref: "#/components/schemas/Tone"
        additional_constraints:
          type: array
          items:
            type: string
        confirmed_by_agent:
          type: boolean
          description: |
            True once the agent has voiced the one-sentence summary and
            generation may begin. Session MUST NOT transition setup→generating
            until this is true.
        confirmed_at:
          type: string
          format: date-time
          nullable: true

    CharacterRef:
      type: object
      required: [char_id, name, description, introduced_on_page, voice_command_id]
      properties:
        char_id:
          type: string
          description: Slug identifier (e.g. "yellow_bird")
        name:
          type: string
        description:
          type: string
          description: Visual description used in image generation prompts
        reference_image_gcs_uri:
          type: string
          nullable: true
          description: GCS URI of first-appearance illustration; null until that PageAsset is ready
        introduced_on_page:
          type: integer
          minimum: 1
          maximum: 5
        voice_command_id:
          type: string
          format: uuid
          description: ID of the VoiceCommand that introduced this character

    StyleBible:
      type: object
      description: |
        Visual and mood parameters shared across all page illustration prompts.
        Extracted as a standalone schema so tone-change VoiceCommands can update
        `mood` without touching protagonist visuals.
      required: [art_style, color_palette, mood, negative_style_terms]
      properties:
        art_style:
          type: string
          example: "soft colorful picture book illustration"
        color_palette:
          type: string
          example: "pastel purples, warm yellows, soft greens"
        mood:
          type: string
          description: Updated in-place when a tone_change VoiceCommand is applied
          example: "warm, gentle, playful"
        negative_style_terms:
          type: array
          items:
            type: string
          description: Terms excluded from every image prompt
          example: ["realistic", "dark", "scary"]
        last_updated_by_command_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the VoiceCommand that last mutated `mood`; null if never changed

    ContentPolicy:
      type: object
      description: |
        Active content exclusion constraints applied to every generation call.
        Pre-populated with base policy; extended when a SafetyDecision is accepted.
      required: [exclusions]
      properties:
        exclusions:
          type: array
          items:
            type: string
          description: |
            e.g. ["no destruction", "no gore", "no fear escalation"]
        derived_from_safety_decisions:
          type: array
          items:
            type: string
            format: uuid
          description: SafetyDecision IDs that contributed exclusion constraints

    CharacterBible:
      type: object
      description: |
        Single authoritative record for visual and narrative consistency across all 5 pages.
        Contains protagonist visual profile, StyleBible, ContentPolicy, and secondary characters.
      required:
        [protagonist_name, species_or_type, color, notable_traits,
         style_bible, content_policy]
      properties:
        protagonist_name:
          type: string
        species_or_type:
          type: string
          example: "purple monster"
        color:
          type: string
          example: "bright purple"
        attire:
          type: string
          nullable: true
        notable_traits:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 4
        reference_image_gcs_uri:
          type: string
          nullable: true
          description: |
            GCS URI of the page-1 illustration; null until page 1 PageAsset(illustration)
            is ready. Used as visual anchor for pages 2–5.
        style_bible:
          $ref: "#/components/schemas/StyleBible"
        content_policy:
          $ref: "#/components/schemas/ContentPolicy"
        secondary_characters:
          type: array
          items:
            $ref: "#/components/schemas/CharacterRef"

    PageAsset:
      type: object
      description: |
        One binary asset (illustration PNG or narration MP3) belonging to a Page.
        Extracted from Page so each asset has its own independent lifecycle,
        retry state, and signed URL.
      required: [asset_id, page_number, asset_type, generation_status]
      properties:
        asset_id:
          type: string
          format: uuid
        page_number:
          type: integer
          minimum: 1
          maximum: 5
        asset_type:
          $ref: "#/components/schemas/AssetType"
        generation_status:
          $ref: "#/components/schemas/AssetStatus"
        gcs_uri:
          type: string
          nullable: true
          description: |
            gs://{bucket}/sessions/{session_id}/pages/{page_number}/{asset_type}.*
            Set when generation_status = ready.
        signed_url:
          type: string
          nullable: true
          description: Short-lived HTTPS read URL (1 hour TTL); set when gcs_uri is set
        signed_url_expires_at:
          type: string
          format: date-time
          nullable: true
        error_detail:
          type: string
          nullable: true
          description: Imagen/TTS error code or message; set when generation_status = failed
        generated_at:
          type: string
          format: date-time
          nullable: true

    Page:
      type: object
      description: One page of the storybook. Asset URLs are in the PageAsset sub-resources.
      required: [page_number, status, beat, illustration_failed, audio_failed]
      properties:
        page_number:
          type: integer
          minimum: 1
          maximum: 5
        status:
          $ref: "#/components/schemas/PageStatus"
        beat:
          type: string
          description: Page beat from Session.story_arc used to drive generation
        text:
          type: string
          nullable: true
          description: Generated story text (60–120 words); set when status ≥ text_ready
        narration_script:
          type: string
          nullable: true
          description: TTS-optimised version of text; may differ from display text
        illustration_failed:
          type: boolean
          default: false
        audio_failed:
          type: boolean
          default: false
        steering_applied:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of VoiceCommands that influenced this page's generation
        generated_at:
          type: string
          format: date-time
          nullable: true

    UserTurn:
      type: object
      description: |
        One individual voice exchange (user utterance or agent response) within the session.
        Provides a complete ordered conversation log for debugging, safety auditing, and replay.
      required: [turn_id, sequence, phase, speaker, raw_transcript, caption_text, timestamp]
      properties:
        turn_id:
          type: string
          format: uuid
        sequence:
          type: integer
          minimum: 1
          description: 1-based monotonic turn counter within the session
        phase:
          $ref: "#/components/schemas/TurnPhase"
        speaker:
          type: string
          enum: [user, agent]
        raw_transcript:
          type: string
          description: Verbatim ASR transcript or agent text; never surfaced in UI if from SafetyDecision
        caption_text:
          type: string
          description: |
            Text rendered to the on-screen caption strip.
            MUST NOT contain content from SafetyDecision.raw_input.
        voice_command_id:
          type: string
          format: uuid
          nullable: true
          description: Set if this user turn produced a VoiceCommand
        safety_decision_id:
          type: string
          format: uuid
          nullable: true
          description: Set if this user turn triggered a SafetyDecision
        page_context:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Page being narrated or awaited when this turn occurred; null during setup
        timestamp:
          type: string
          format: date-time

    VoiceCommand:
      type: object
      description: |
        One mid-story voice steering instruction.
        Replaces the former `SteeringCommand` name.
      required: [command_id, turn_id, raw_transcript, interpreted_intent,
                 command_type, applied_to_pages, safe, received_at]
      properties:
        command_id:
          type: string
          format: uuid
        turn_id:
          type: string
          format: uuid
          description: ID of the UserTurn that produced this command
        raw_transcript:
          type: string
        interpreted_intent:
          type: string
          example: "add yellow bird companion from page 3 onward"
        command_type:
          $ref: "#/components/schemas/CommandType"
        applied_to_pages:
          type: array
          items:
            type: integer
          description: Page numbers not yet generated when the command was received
        new_character_ref_id:
          type: string
          nullable: true
          description: Set if command_type = character_introduction; references CharacterRef.char_id
        safe:
          type: boolean
          description: true if passed safety check; false if a rewrite was applied
        safety_decision_id:
          type: string
          format: uuid
          nullable: true
          description: Set if safe = false; references SafetyDecision.decision_id
        received_at:
          type: string
          format: date-time

    SafetyDecision:
      type: object
      description: |
        Record of one detected unsafe utterance and the system's response.
        Replaces the former `SafetyEvent` name.
        raw_input MUST NOT appear in any UI channel, caption, or generation prompt.
      required: [decision_id, turn_id, phase, raw_input, detected_category,
                 proposed_rewrite, user_accepted, triggered_at]
      properties:
        decision_id:
          type: string
          format: uuid
        turn_id:
          type: string
          format: uuid
        phase:
          type: string
          enum: [setup, steering]
        raw_input:
          type: string
          description: Original unsafe utterance; stored for audit only; NEVER surfaced in UI
        detected_category:
          $ref: "#/components/schemas/SafetyCategory"
        proposed_rewrite:
          type: string
          description: Child-safe alternative voiced to the user
        user_accepted:
          type: boolean
          description: |
            true = user acknowledged or redirected; false = session abandoned.
            user_accepted = false during phase = setup MUST set Session.status = error.
        final_premise:
          type: string
          nullable: true
          description: Premise used for generation after acknowledgment; may include user-added detail
        exclusion_added:
          type: string
          nullable: true
          description: Constraint string appended to ContentPolicy.exclusions on acceptance
        triggered_at:
          type: string
          format: date-time

    Session:
      type: object
      description: |
        One complete story creation session from voice setup through page 5 delivery.
        Replaces the former `StorySession` name.
      required: [session_id, status, created_at, updated_at, page_count, current_page]
      properties:
        session_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SessionStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        page_count:
          type: integer
          const: 5
        current_page:
          type: integer
          minimum: 0
          maximum: 5
        story_arc:
          type: array
          items:
            type: string
          minItems: 5
          maxItems: 5
          nullable: true
          description: 5-element array of page beat summaries; set when StoryBrief is confirmed
        error_message:
          type: string
          nullable: true
        story_brief:
          $ref: "#/components/schemas/StoryBrief"
          nullable: true
        character_bible:
          $ref: "#/components/schemas/CharacterBible"
          nullable: true
        pages:
          type: array
          items:
            $ref: "#/components/schemas/Page"
          nullable: true

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

# ── REST Endpoints ────────────────────────────────────────────────────────────

paths:

  /sessions:
    post:
      operationId: createSession
      summary: Create a new story session
      description: |
        Creates an empty Session document in Firestore with `status = setup`.
        Returns the `session_id` and WebSocket URL for the client to use.
        This is always the first call before any WebSocket connection.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                device_hint:
                  type: string
                  description: Optional opaque client hint for logging/analytics
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [session_id, ws_url]
                properties:
                  session_id:
                    type: string
                    format: uuid
                  ws_url:
                    type: string
                    description: Fully-qualified WebSocket URL for this session
                    example: "wss://api.voice-story-agent.run.app/ws/story/{session_id}"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}:
    get:
      operationId: getSession
      summary: Fetch full session state
      description: |
        Returns the current Session document including StoryBrief, CharacterBible,
        all Pages (without inline PageAsset URLs — fetch those separately via
        `/sessions/{id}/pages/{n}/assets`), and all UserTurns count.
        Use this endpoint to recover state after a WebSocket reconnect.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/voice-session:
    post:
      operationId: startVoiceSession
      summary: Start live voice session (reserve ADK bidi-stream slot)
      description: |
        Initialises the Google ADK bidi-streaming session for this `session_id`
        on the backend, allocating a Gemini Live API connection slot.

        Call this **before** opening the WebSocket connection. The WebSocket
        `session_start` client message then activates the reserved slot.

        **Session must be in `setup` status** — calling this after `generating`
        or `complete` returns 409.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ADK bidi-stream slot reserved; client may now open WebSocket
          content:
            application/json:
              schema:
                type: object
                required: [session_id, ready]
                properties:
                  session_id:
                    type: string
                    format: uuid
                  ready:
                    type: boolean
                    const: true
                  voice_model:
                    type: string
                    description: Gemini Live model identifier in use
                    example: "gemini-2.0-flash-live-001"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Session is not in `setup` status; cannot start voice session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/character-bible/generate:
    post:
      operationId: generateCharacterBible
      summary: Generate canonical character reference (CharacterBible + StyleBible)
      description: |
        Triggers Gemini Pro to derive the CharacterBible and StyleBible from
        the confirmed StoryBrief, then persists both to Firestore.

        Normally called automatically by the backend when `story_brief_confirmed`
        fires over the WebSocket, but exposed as a REST endpoint for:
        - Retry after a backend transient failure
        - Integration testing without a live voice session

        **Session must be in `generating` status** and `StoryBrief.confirmed_by_agent`
        must be `true`.

        The `character_bible_ready` WebSocket event is emitted after successful generation.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: CharacterBible generated and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterBible"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Precondition failed — session not in `generating` status, or
            StoryBrief not yet confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/pages/generate:
    post:
      operationId: generateNextPage
      summary: Generate the next story page
      description: |
        Triggers generation of `Session.current_page + 1`. Dispatches:
        1. Gemini Pro text generation using the current beat + CharacterBible + ContentPolicy
        2. Imagen illustration generation (with reference-image anchor)
        3. Google Cloud Text-to-Speech narration synthesis (stored as MP3 in Cloud Storage)

        Each step emits the corresponding WebSocket event
        (`page_text_ready`, `page_image_ready` / `page_asset_failed`, `page_audio_ready` /
        `page_asset_failed`, then `page_complete`).

        Normally called automatically by the backend when the steering window closes,
        but exposed as a REST endpoint for retry and integration testing.

        **Session must be in `generating` status** and the steering window for the
        current page must be closed (not open).
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force_page:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: |
                    Override which page to generate. Only for test/retry use.
                    Omit in production — the backend determines the correct page.
      responses:
        "202":
          description: Page generation job accepted and enqueued
          content:
            application/json:
              schema:
                type: object
                required: [session_id, page_number, status]
                properties:
                  session_id:
                    type: string
                    format: uuid
                  page_number:
                    type: integer
                  status:
                    type: string
                    const: generating
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Precondition failed — session not in `generating` status,
            steering window is still open, or all 5 pages already complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/voice-commands:
    post:
      operationId: applyVoiceFeedback
      summary: Apply live story feedback (submit a VoiceCommand)
      description: |
        Submits a VoiceCommand for a session that is in `generating` status.
        Use this REST endpoint to apply steering programmatically (e.g., from
        integration tests). In a live session, steering commands arrive via the
        WebSocket `voice_feedback` client message instead.

        The backend:
        1. Runs the safety check (creates a SafetyDecision if needed)
        2. Creates a VoiceCommand document
        3. Applies the command to all pages not yet generated
        4. Emits `voice_command_received` and `voice_command_applied` WebSocket events

        If the command triggers a SafetyDecision, it is not applied until
        `user_accepted = true` (resolved via the WebSocket safety flow).
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_transcript, command_type]
              properties:
                raw_transcript:
                  type: string
                  description: Verbatim text of the voice command
                command_type:
                  $ref: "#/components/schemas/CommandType"
                interpreted_intent:
                  type: string
                  description: |
                    Optional pre-interpreted intent. If omitted, the backend
                    derives it via Gemini Pro.
      responses:
        "201":
          description: VoiceCommand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCommand"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Session not in `generating` status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/pages/{page_number}:
    get:
      operationId: getPage
      summary: Fetch a single story page (metadata only)
      description: |
        Returns Page metadata. Asset signed URLs are NOT included here —
        fetch them from `/sessions/{id}/pages/{n}/assets`.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page_number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        "200":
          description: Page found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          description: Page not yet generated or session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/pages/{page_number}/assets:
    get:
      operationId: getPageAssets
      summary: Fetch all PageAssets for a page
      description: |
        Returns both PageAsset documents (illustration + narration) for the given page.
        Each includes a fresh signed URL if the asset is in `ready` status.
        Use this after a WebSocket reconnect to recover asset URLs that may have
        been missed during disconnection.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page_number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        "200":
          description: Assets returned (may be empty if page text not yet ready)
          content:
            application/json:
              schema:
                type: object
                required: [page_number, assets]
                properties:
                  page_number:
                    type: integer
                  assets:
                    type: array
                    items:
                      $ref: "#/components/schemas/PageAsset"
        "404":
          description: Session or page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sessions/{session_id}/pages/{page_number}/assets/{asset_type}:
    get:
      operationId: getPageAsset
      summary: Fetch a single PageAsset (illustration or narration)
      description: |
        Returns one PageAsset document with a fresh signed URL if ready.
        Useful for refreshing an expired signed URL without re-fetching both assets.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page_number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: asset_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetType"
      responses:
        "200":
          description: Asset found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAsset"
        "404":
          description: Asset not found or not yet generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      operationId: healthCheck
      summary: Cloud Run health probe
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok

# ── WebSocket Contract ────────────────────────────────────────────────────────
#
# Endpoint:  /ws/story/{session_id}
# Protocol:  WebSocket (HTTP/1.1 Upgrade)
# Auth:      Bearer token as query param: ?token={firebase_id_token}
#            (Authorization header not available for WebSocket in all browsers)
#
# Frame types:
#   binary (C→S)  → raw PCM audio (16-bit, 16 kHz, mono) — microphone chunks
#   binary (S→C)  → raw PCM audio (16-bit, 16 kHz, mono) — agent voice chunks
#   text          → UTF-8 JSON; all messages carry a required "type" discriminator
#
# All JSON message shapes are defined below under x-websocket-events.
# ─────────────────────────────────────────────────────────────────────────────

x-websocket-events:
  description: |
    All WebSocket JSON message schemas.
    Direction: C = Client → Server, S = Server → Client, B = Both.

  # ────────────────────────────────────────────────────────────────────────────
  # CLIENT → SERVER messages
  # ────────────────────────────────────────────────────────────────────────────

  client_messages:

    audio_chunk:
      direction: C
      description: |
        Streaming PCM audio from the browser microphone.
        Send as **binary** WebSocket frames, not JSON.
        Documented here for completeness; no JSON schema applies.
      frame_format: binary
      encoding: raw PCM, 16-bit signed little-endian, 16 kHz, mono

    session_start:
      direction: C
      description: |
        Sent immediately after WebSocket connection is established, after calling
        `POST /sessions/{id}/voice-session`. Signals the backend to activate the
        reserved ADK bidi-stream slot and begin listening for microphone audio.
        The server responds with `voice_session_ready`.
      fields:
        type: "session_start"
        session_id:
          type: string
          format: uuid

    transcript_input:
      direction: C
      description: |
        Text-based input fallback for non-audio clients (integration tests,
        accessibility tools). The backend treats this identically to a finalised
        ASR transcript from an audio_chunk stream — it is routed through the same
        safety check, intent parser, and steering pipeline.
        A `turn_detected` server event is emitted in response.
      fields:
        type: "transcript_input"
        text:
          type: string
          description: The user utterance as plain text
        phase:
          description: Which phase this input belongs to
          $ref: "#/components/schemas/TurnPhase"

    interrupt:
      direction: C
      description: |
        Signals that the user has spoken while a page is being narrated.
        The backend pauses narration within 1 second and begins listening.
        If a valid steering command follows, it is captured as a VoiceCommand.
        If speech is unclear, the agent asks one clarifying question.
      fields:
        type: "interrupt"
        page_number:
          type: integer
          description: The page currently being narrated

    voice_feedback:
      direction: C
      description: |
        Explicit steering command submitted as text over WebSocket (used when
        the client has already transcribed the audio locally and wants to submit
        a steering intent directly, e.g. from a custom front-end with local ASR).
        The backend creates a VoiceCommand, runs safety check, and emits
        `voice_command_received` + `voice_command_applied`.
      fields:
        type: "voice_feedback"
        raw_transcript:
          type: string
        command_type:
          $ref: "#/components/schemas/CommandType"

    ping:
      direction: C
      description: Keepalive ping; server responds with `pong`.
      fields:
        type: "ping"

  # ────────────────────────────────────────────────────────────────────────────
  # SERVER → CLIENT messages
  # ────────────────────────────────────────────────────────────────────────────

  server_messages:

    agent_audio_chunk:
      direction: S
      description: |
        Streaming PCM audio from the Gemini Live voice agent covering **conversational
        turns only**: setup hold phrases, setup confirmations, safety rewrite proposals,
        steering acknowledgements, and the closing message.
        Per-page story narration is NOT carried here — it is synthesised by Cloud
        Text-to-Speech, stored as an MP3 in Cloud Storage, and delivered via the
        `page_audio_ready` signed URL for reliable playback from the frontend audio element.
        Sent as **binary** WebSocket frames, not JSON.
        Documented here for completeness; no JSON schema applies.
      frame_format: binary
      encoding: raw PCM, 16-bit signed little-endian, 16 kHz, mono

    connected:
      direction: S
      description: Sent immediately after the WebSocket handshake completes, before `session_start`.
      fields:
        type: "connected"
        session_id:
          type: string
          format: uuid
        session_status:
          $ref: "#/components/schemas/SessionStatus"

    voice_session_ready:
      direction: S
      description: |
        Sent in response to the client `session_start` message once the ADK
        bidi-stream is active. Microphone audio is now being processed.
        Frontend SHOULD start streaming audio_chunk binary frames.
      fields:
        type: "voice_session_ready"
        session_id:
          type: string
          format: uuid
        voice_model:
          type: string
          description: Gemini Live model identifier in use
          example: "gemini-2.0-flash-live-001"

    transcript:
      direction: S
      description: |
        Real-time speech transcript for caption rendering.
        Emitted for both user and agent utterances.
        Partial transcripts arrive with `is_final = false`; the final, committed
        transcript arrives with `is_final = true`.
        MUST NOT contain content from any SafetyDecision.raw_input.
      fields:
        type: "transcript"
        turn_id:
          type: string
          format: uuid
          description: ID of the UserTurn this transcript belongs to
        role:
          type: string
          enum: [user, agent]
        text:
          type: string
        is_final:
          type: boolean
          description: false = partial streaming; true = utterance complete
        phase:
          $ref: "#/components/schemas/TurnPhase"

    turn_detected:
      direction: S
      description: |
        Emitted when a complete user utterance has been recognised and routed.
        Provides the final UserTurn record including routing outcome.
        Frontend can use this to update caption state and show routing indicators.
      fields:
        type: "turn_detected"
        turn_id:
          type: string
          format: uuid
        sequence:
          type: integer
        phase:
          $ref: "#/components/schemas/TurnPhase"
        caption_text:
          type: string
        routed_to:
          type: string
          enum: [setup_extraction, safety_check, steering_parser, narration_ack]
          description: Which pipeline handled this turn
        voice_command_id:
          type: string
          format: uuid
          nullable: true
        safety_decision_id:
          type: string
          format: uuid
          nullable: true

    story_brief_updated:
      direction: S
      description: |
        Emitted each time the agent confirms a single setup parameter during
        conversation. Allows the frontend to progressively render confirmed params.
      fields:
        type: "story_brief_updated"
        param:
          type: string
          enum: [protagonist_name, protagonist_description, setting, tone]
          description: Which StoryBrief field was just confirmed
        value:
          type: string
          description: The confirmed value for this parameter
        remaining_params:
          type: array
          items:
            type: string
          description: Parameters not yet confirmed in this setup session

    story_brief_confirmed:
      direction: S
      description: |
        Emitted when the agent has read back the one-sentence summary, the user
        has acknowledged, and StoryBrief.confirmed_by_agent = true.
        Session status transitions to `generating` immediately after this event.
        Supersedes the legacy `setup_complete` event name.
      fields:
        type: "story_brief_confirmed"
        session_id:
          type: string
          format: uuid
        story_brief:
          $ref: "#/components/schemas/StoryBrief"
        agent_summary:
          type: string
          description: |
            The one-sentence confirmation the agent spoke aloud
            (e.g. "Great! A silly purple bunny in a sunny meadow — let's begin!")

    character_bible_ready:
      direction: S
      description: |
        Emitted after CharacterBible and StyleBible have been generated from the
        confirmed StoryBrief and persisted to Firestore. This is the last event
        before `page_generating` for page 1. Frontend MAY display a protagonist
        description card.
      fields:
        type: "character_bible_ready"
        session_id:
          type: string
          format: uuid
        character_bible:
          $ref: "#/components/schemas/CharacterBible"

    safety_rewrite:
      direction: S
      description: |
        Emitted when the safety middleware detects forbidden content in a user turn.
        The agent simultaneously voices the `proposed_rewrite` via ADK audio.
        No generation begins until `safety_accepted` is emitted.
        Frontend SHOULD display the proposed rewrite text and mute the microphone
        temporarily until the agent finishes speaking.
      fields:
        type: "safety_rewrite"
        decision_id:
          type: string
          format: uuid
        turn_id:
          type: string
          format: uuid
        detected_category:
          $ref: "#/components/schemas/SafetyCategory"
        proposed_rewrite:
          type: string
          description: Child-safe alternative (MUST NOT contain original unsafe content)
        phase:
          type: string
          enum: [setup, steering]

    safety_accepted:
      direction: S
      description: Emitted when the user has acknowledged the safety rewrite.
      fields:
        type: "safety_accepted"
        decision_id:
          type: string
          format: uuid
        final_premise:
          type: string
          description: The premise accepted for generation (may include user-added detail)
        exclusion_added:
          type: string
          nullable: true
          description: Content exclusion constraint added to ContentPolicy

    safety_rejected:
      direction: S
      description: |
        Emitted when the user abandons the session after a safety rewrite proposal
        (user_accepted = false). If phase = setup, Session.status transitions to
        `error` and the WebSocket closes after this event.
      fields:
        type: "safety_rejected"
        decision_id:
          type: string
          format: uuid
        phase:
          type: string
          enum: [setup, steering]
        session_terminated:
          type: boolean
          description: true if Session.status was set to error as a result

    page_generating:
      direction: S
      description: |
        Emitted when the backend begins generating a new page.
        Frontend MUST show HoldAnimation and the agent will speak a hold phrase
        via `agent_audio_chunk` binary frames within 1 second.
      fields:
        type: "page_generating"
        page:
          type: integer
          minimum: 1
          maximum: 5
        voice_commands_applied:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of VoiceCommands that will influence this page's generation

    page_text_ready:
      direction: S
      description: Story text for this page is available; frontend may display it.
      fields:
        type: "page_text_ready"
        page:
          type: integer
        text:
          type: string
          description: 60–120 word story text; safe (ContentPolicy applied)

    page_image_ready:
      direction: S
      description: |
        Illustration PageAsset is ready. Frontend SHOULD display this image.
        If page 1, the protagonist reference image has also been stored in
        CharacterBible.ProtagonistProfile.reference_image_gcs_uri.
      fields:
        type: "page_image_ready"
        page:
          type: integer
        asset_id:
          type: string
          format: uuid
        image_url:
          type: string
          description: Signed HTTPS URL, valid 1 hour
        signed_url_expires_at:
          type: string
          format: date-time

    page_audio_ready:
      direction: S
      description: |
        Cloud Text-to-Speech narration for this page is ready. The signed URL points
        to an MP3 stored in Cloud Storage. Frontend MUST auto-play this URL using the
        HTML5 `<audio>` element. This is the sole narration channel for story pages;
        the ADK Gemini Live agent (`agent_audio_chunk`) handles conversational turns
        only and does NOT re-narrate story page text.
      fields:
        type: "page_audio_ready"
        page:
          type: integer
        asset_id:
          type: string
          format: uuid
        audio_url:
          type: string
          description: Signed HTTPS URL, valid 1 hour
        signed_url_expires_at:
          type: string
          format: date-time

    page_asset_failed:
      direction: S
      description: |
        One asset could not be generated. Session continues.
        Frontend MUST show a graceful fallback (placeholder image or text-only mode).
        The `page_complete` event will still follow.
      fields:
        type: "page_asset_failed"
        page:
          type: integer
        asset_type:
          $ref: "#/components/schemas/AssetType"
        asset_id:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string

    page_complete:
      direction: S
      description: |
        All assets for this page have reached a terminal state (ready or failed).
        Frontend MUST dismiss HoldAnimation and render the full page view.
        The steering window opens immediately after this event.
      fields:
        type: "page_complete"
        page:
          type: integer
        illustration_failed:
          type: boolean
        audio_failed:
          type: boolean
        generated_at:
          type: string
          format: date-time

    steering_window_open:
      direction: S
      description: |
        Page narration has ended. The agent is now listening for a VoiceCommand.
        Frontend SHOULD show a subtle "you can speak" affordance.
        If no command is received within `timeout_ms`, `steering_window_closed` fires.
      fields:
        type: "steering_window_open"
        page_just_completed:
          type: integer
        timeout_ms:
          type: integer
          description: Steering window duration (always 10000 ms for MVP)
          example: 10000

    voice_command_received:
      direction: S
      description: |
        A VoiceCommand has been heard and is being processed (safety check +
        intent parsing). Replaces the legacy `steering_received` event name.
      fields:
        type: "voice_command_received"
        command_id:
          type: string
          format: uuid
        turn_id:
          type: string
          format: uuid
        raw_transcript:
          type: string
        interpreted_as:
          type: string
          description: Agent's derived intent string

    voice_command_applied:
      direction: S
      description: |
        VoiceCommand has passed safety check and been applied to remaining pages.
        Replaces the legacy `steering_applied` event name.
        If the command triggered a safety rewrite, this event fires only after
        `safety_accepted` — not before.
      fields:
        type: "voice_command_applied"
        command_id:
          type: string
          format: uuid
        command_type:
          $ref: "#/components/schemas/CommandType"
        pages_affected:
          type: array
          items:
            type: integer
          description: Page numbers that will reflect this command
        new_character_ref_id:
          type: string
          nullable: true
          description: Set if command_type = character_introduction

    steering_window_closed:
      direction: S
      description: |
        Steering window has ended. Next page generation begins immediately.
      fields:
        type: "steering_window_closed"
        reason:
          type: string
          enum: [timeout, voice_command_applied, user_silent]

    story_complete:
      direction: S
      description: |
        All 5 pages have been delivered. Session.status is now `complete`.
        Agent speaks a warm closing message via `agent_audio_chunk` binary frames.
        Frontend SHOULD offer a "start new story" option.
      fields:
        type: "story_complete"
        session_id:
          type: string
          format: uuid
        page_count:
          type: integer
          const: 5
        pages_with_failures:
          type: array
          items:
            type: integer
          description: Page numbers where illustration or narration failed; empty if all succeeded

    session_error:
      direction: S
      description: |
        Unrecoverable session error. The WebSocket will close after this message.
        Frontend SHOULD display an error state and offer a restart option.
      fields:
        type: "session_error"
        code:
          type: string
        message:
          type: string
        session_terminated:
          type: boolean
          const: true

    pong:
      direction: S
      description: Response to client `ping` keepalive.
      fields:
        type: "pong"
