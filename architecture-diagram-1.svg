<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">

<rect width="900" height="540" fill="#ffffff"/>

<!-- Title -->
<text x="450" y="35" text-anchor="middle" style="font:bold 22px Arial,sans-serif;fill:#111827">WhisperTale — Architecture</text>

