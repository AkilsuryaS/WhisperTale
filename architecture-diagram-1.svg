<text x="620" y="256" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fce7f3">Illustrations</text>

<rect x="710" y="213" width="150" height="58" rx="8" fill="#ec4899"/>
<text x="785" y="238" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Cloud TTS</text>
<text x="785" y="256" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fce7f3">Narration audio</text>

