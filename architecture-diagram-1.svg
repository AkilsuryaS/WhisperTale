<text x="220" y="398" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#d1fae5">Sessions + story state</text>

<rect x="360" y="355" width="180" height="55" rx="8" fill="#10b981"/>
<text x="450" y="380" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Cloud Storage</text>
<text x="450" y="398" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#d1fae5">Images + audio files</text>

<rect x="590" y="355" width="180" height="55" rx="8" fill="#10b981"/>
<text x="680" y="380" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Cloud Logging</text>
<text x="680" y="398" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#d1fae5">Observability</text>

<!-- Bottom flow -->
<text x="450" y="475" text-anchor="middle" style="font:400 13px Arial,sans-serif;fill:#6b7280">Child speaks → Backend orchestrates Gemini + Imagen + TTS → Storybook delivered in real time</text>

<!-- SDK labels -->
<text x="450" y="500" text-anchor="middle" style="font:400 11px Arial,sans-serif;fill:#b0b0b0">Built with Google GenAI SDK / ADK  ·  Hosted entirely on Google Cloud</text>

