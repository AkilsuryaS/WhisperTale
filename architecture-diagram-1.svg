<rect x="50" y="213" width="150" height="58" rx="8" fill="#f59e0b"/>
<text x="125" y="238" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Gemini Live</text>
<text x="125" y="256" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fef3c7">Voice conversation</text>

<rect x="215" y="213" width="150" height="58" rx="8" fill="#f59e0b"/>
