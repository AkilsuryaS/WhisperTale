<text x="385" y="109" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Next.js 14 Frontend</text>
<text x="385" y="125" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#c7d2fe">Firebase App Hosting</text>

<line x1="490" y1="111" x2="550" y2="111" stroke="#94a3b8" stroke-width="2"/>
<polygon points="547,105 557,111 547,117" fill="#94a3b8"/>
<text x="520" y="104" text-anchor="middle" style="font:400 9px Arial,sans-serif;fill:#9ca3af">WebSocket</text>

<rect x="560" y="88" width="210" height="46" rx="8" fill="#1e40af"/>
<text x="665" y="109" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">FastAPI Backend</text>
<text x="665" y="125" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#93c5fd">Google Cloud Run</text>

<!-- Arrow down -->
<line x1="450" y1="145" x2="450" y2="170" stroke="#94a3b8" stroke-width="2"/>
<polygon points="443,167 450,177 457,167" fill="#94a3b8"/>

<!-- ====== Layer 2: Google AI ====== -->
<rect x="30" y="180" width="840" height="105" rx="14" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
