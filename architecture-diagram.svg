<text x="600" y="110" class="sectionLabel">BACKEND (GOOGLE CLOUD RUN)</text>

<rect x="600" y="125" width="540" height="80" rx="14" fill="#1e40af"/>
<text x="870" y="152" text-anchor="middle" class="boxLabel">FastAPI Backend — Cloud Run</text>
<text x="870" y="170" text-anchor="middle" class="boxSub">WebSocket handler  ·  Story orchestrator  ·  Safety layer  ·  REST API</text>
<text x="870" y="188" text-anchor="middle" class="boxSub">Coordinates voice setup → story planning → page generation → edits</text>

