<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">

<rect width="960" height="600" fill="#ffffff"/>

<!-- Title -->
<text x="480" y="32" text-anchor="middle" style="font:bold 20px Arial,sans-serif;fill:#111827">WhisperTale  System Architecture</text>

<!-- ============================================ -->
<!-- LEFT: Child + Frontend                       -->
<!-- ============================================ -->

<rect x="40" y="220" width="150" height="55" rx="10" fill="#3b82f6"/>
<text x="115" y="253" text-anchor="middle" style="font:bold 14px Arial,sans-serif;fill:#fff">Child</text>

<!-- Child ’ Frontend -->
<line x1="190" y1="248" x2="230" y2="248" stroke="#64748b" stroke-width="2"/>
<polygon points="227,242 237,248 227,254" fill="#64748b"/>

<rect x="240" y="210" width="160" height="75" rx="10" fill="#6366f1"/>
<text x="320" y="242" text-anchor="middle" style="font:bold 14px Arial,sans-serif;fill:#fff">Frontend</text>
<text x="320" y="260" text-anchor="middle" style="font:400 11px Arial,sans-serif;fill:#c7d2fe">Next.js 14</text>
<text x="320" y="275" text-anchor="middle" style="font:400 11px Arial,sans-serif;fill:#c7d2fe">Firebase App Hosting</text>

<!-- Frontend ’ Backend -->
<line x1="400" y1="248" x2="450" y2="248" stroke="#64748b" stroke-width="2"/>
<polygon points="447,242 457,248 447,254" fill="#64748b"/>
<text x="425" y="240" text-anchor="middle" style="font:400 9px Arial,sans-serif;fill:#94a3b8">WebSocket</text>

<!-- ============================================ -->
<!-- CENTER: Backend (the hub)                    -->
<!-- ============================================ -->

<rect x="460" y="195" width="170" height="105" rx="12" fill="#1e40af"/>
<text x="545" y="237" text-anchor="middle" style="font:bold 16px Arial,sans-serif;fill:#fff">Backend</text>
<text x="545" y="258" text-anchor="middle" style="font:400 12px Arial,sans-serif;fill:#93c5fd">FastAPI</text>
<text x="545" y="278" text-anchor="middle" style="font:400 12px Arial,sans-serif;fill:#93c5fd">Cloud Run</text>

<!-- ============================================ -->
<!-- RIGHT: Google AI Services (spokes)           -->
<!-- ============================================ -->

<!-- Gemini Live -->
<rect x="740" y="60" width="180" height="55" rx="10" fill="#f59e0b"/>
<text x="830" y="85" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Gemini Live API</text>
<text x="830" y="103" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fef3c7">Real-time voice (ADK)</text>

