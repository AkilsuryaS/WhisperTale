<text x="425" y="348" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Page text generation</text>
<text x="425" y="366" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Character bible creation</text>

