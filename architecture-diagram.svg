<text x="410" y="660" text-anchor="middle" class="boxSub">Illustration PNGs</text>
<text x="410" y="678" text-anchor="middle" class="boxSub">Narration audio + signed URLs</text>

<!-- Cloud Logging -->
<rect x="540" y="610" width="220" height="85" rx="14" fill="#10b981"/>
