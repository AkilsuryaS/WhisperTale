<text x="170" y="660" text-anchor="middle" class="boxSub">Sessions, pages, assets</text>
<text x="170" y="678" text-anchor="middle" class="boxSub">Story state persistence</text>

<!-- Cloud Storage -->
<rect x="300" y="610" width="220" height="85" rx="14" fill="#10b981"/>
