<text x="600" y="765" text-anchor="middle" style="font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #374151;">End-to-end: Child speaks → Frontend streams audio via WebSocket → Cloud Run orchestrates Gemini + Imagen + TTS →</text>
<text x="600" y="783" text-anchor="middle" style="font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #374151;">Assets stored in GCS + state in Firestore → Frontend renders the illustrated storybook with narration in real time</text>

