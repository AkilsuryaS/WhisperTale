<polygon points="735,100 745,90 741,102" fill="#f59e0b"/>
<text x="670" y="145" style="font:500 10px Arial,sans-serif;fill:#92400e">voice streaming</text>

<!-- Gemini Pro -->
<rect x="740" y="140" width="180" height="55" rx="10" fill="#f59e0b"/>
<text x="830" y="165" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Gemini 2.5 Pro</text>
<text x="830" y="183" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fef3c7">Story text + characters</text>

<!-- Backend ’ Gemini Pro -->
<line x1="630" y1="235" x2="740" y2="168" stroke="#f59e0b" stroke-width="2"/>
<polygon points="736,174 745,163 740,176" fill="#f59e0b"/>
<text x="700" y="208" style="font:500 10px Arial,sans-serif;fill:#92400e">story planning</text>

<!-- Gemini Flash -->
<rect x="740" y="220" width="180" height="55" rx="10" fill="#f59e0b"/>
<text x="830" y="245" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Gemini 2.5 Flash</text>
<text x="830" y="263" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fef3c7">Safety + edit routing</text>

<!-- Backend ’ Gemini Flash -->
<line x1="630" y1="248" x2="740" y2="248" stroke="#f59e0b" stroke-width="2"/>
<polygon points="737,242 747,248 737,254" fill="#f59e0b"/>
<text x="685" y="268" style="font:500 10px Arial,sans-serif;fill:#92400e">safety checks</text>

<!-- Imagen 4 -->
<rect x="740" y="300" width="180" height="55" rx="10" fill="#ec4899"/>
<text x="830" y="325" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Imagen 4 Fast</text>
<text x="830" y="343" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fce7f3">Page illustrations</text>

<!-- Backend ’ Imagen -->
<line x1="630" y1="265" x2="740" y2="325" stroke="#ec4899" stroke-width="2"/>
<polygon points="736,319 745,330 740,318" fill="#ec4899"/>
<text x="700" y="310" style="font:500 10px Arial,sans-serif;fill:#9d174d">image gen</text>

<!-- Cloud TTS -->
<rect x="740" y="380" width="180" height="55" rx="10" fill="#ec4899"/>
<text x="830" y="405" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Cloud TTS</text>
<text x="830" y="423" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#fce7f3">Narration audio</text>

<!-- Backend ’ Cloud TTS -->
<line x1="630" y1="280" x2="740" y2="400" stroke="#ec4899" stroke-width="2"/>
<polygon points="736,394 745,405 740,393" fill="#ec4899"/>
<text x="695" y="365" style="font:500 10px Arial,sans-serif;fill:#9d174d">narration</text>

<!-- ============================================ -->
<!-- BOTTOM: Data stores                          -->
<!-- ============================================ -->

<!-- Firestore -->
<rect x="340" y="410" width="170" height="55" rx="10" fill="#10b981"/>
<text x="425" y="435" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Firestore</text>
<text x="425" y="453" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#d1fae5">Sessions + story state</text>

<!-- Backend ’ Firestore -->
<line x1="510" y1="300" x2="440" y2="410" stroke="#10b981" stroke-width="2"/>
<polygon points="434,405 445,415 443,403" fill="#10b981"/>
<text x="458" y="360" style="font:500 10px Arial,sans-serif;fill:#065f46">read/write</text>

<!-- Cloud Storage -->
<rect x="550" y="410" width="170" height="55" rx="10" fill="#10b981"/>
<text x="635" y="435" text-anchor="middle" style="font:bold 13px Arial,sans-serif;fill:#fff">Cloud Storage</text>
<text x="635" y="453" text-anchor="middle" style="font:400 10px Arial,sans-serif;fill:#d1fae5">Images + audio</text>

<!-- Backend ’ Cloud Storage -->
<line x1="575" y1="300" x2="625" y2="410" stroke="#10b981" stroke-width="2"/>
<polygon points="619,405 630,415 628,403" fill="#10b981"/>
<text x="615" y="360" style="font:500 10px Arial,sans-serif;fill:#065f46">store assets</text>

<!-- Bottom summary -->
<text x="480" y="520" text-anchor="middle" style="font:400 12px Arial,sans-serif;fill:#9ca3af">Built with Google GenAI SDK / ADK  ·  Hosted on Google Cloud</text>

</svg>
