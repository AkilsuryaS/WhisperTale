<text x="175" y="330" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">gemini-2.0-flash-live-001</text>
<text x="175" y="348" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Bidi voice streaming via ADK</text>
<text x="175" y="366" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Real-time conversation + transcripts</text>

