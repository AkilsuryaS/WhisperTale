<rect x="560" y="280" width="230" height="100" rx="14" fill="#f59e0b"/>
<text x="675" y="310" text-anchor="middle" style="font: bold 14px 'Segoe UI', Arial, sans-serif; fill: #1a1a2e;">Gemini 2.5 Flash</text>
<text x="675" y="330" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Content safety checks</text>
<text x="675" y="348" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Edit classification + routing</text>
<text x="675" y="366" text-anchor="middle" style="font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #78350f;">Low-latency support tasks</text>

