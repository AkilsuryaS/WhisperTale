<text x="150" y="178" text-anchor="middle" class="boxSub">Mic input + story playback</text>

<!-- Arrow: Child → Frontend -->
<line x1="240" y1="155" x2="300" y2="155" stroke="#3b82f6" class="arrow" marker-end="url(#ah-blue)"/>
<line x1="300" y1="175" x2="240" y2="175" stroke="#3b82f6" class="arrow" marker-end="url(#ah-blue)"/>
<text x="270" y="148" text-anchor="middle" class="edgeLabel">audio</text>
<text x="270" y="192" text-anchor="middle" class="edgeLabel">pages</text>

<!-- Next.js Frontend -->
<rect x="300" y="125" width="220" height="80" rx="14" fill="#6366f1"/>
<text x="410" y="155" text-anchor="middle" class="boxLabel">Next.js 14 Frontend</text>
<text x="410" y="173" text-anchor="middle" class="boxSub">Hold-to-talk UI, storybook viewer</text>
<text x="410" y="191" text-anchor="middle" class="boxSub">Firebase App Hosting</text>

<!-- Arrow: Frontend → Backend -->
<line x1="520" y1="165" x2="600" y2="165" stroke="#3b82f6" class="arrow" marker-end="url(#ah-blue)"/>
