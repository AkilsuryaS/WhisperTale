<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #ffffff; }
    .title { font: bold 28px 'Segoe UI', Arial, sans-serif; fill: #1a1a2e; }
    .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
    .boxLabel { font: bold 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
    .boxSub { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: rgba(255,255,255,0.85); }
    .sectionLabel { font: bold 13px 'Segoe UI', Arial, sans-serif; fill: #6b7280; letter-spacing: 1.5px; }
    .edgeLabel { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .arrow { stroke-width: 2; fill: none; }
    .arrowHead { stroke-width: 2; }
  </style>
  <marker id="ah-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#3b82f6"/></marker>
  <marker id="ah-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/></marker>
  <marker id="ah-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker>
  <marker id="ah-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8b5cf6"/></marker>
</defs>

<rect class="bg" width="1200" height="820" rx="0"/>

<!-- Title -->
<text x="600" y="42" text-anchor="middle" class="title">WhisperTale — System Architecture</text>
<text x="600" y="64" text-anchor="middle" class="subtitle">Voice Story Agent for Children  |  Gemini Live Agent Challenge — Creative Storyteller</text>

<!-- ========== ROW 1: USER + FRONTEND ========== -->
<text x="60" y="110" class="sectionLabel">USER</text>

<!-- Child Browser -->
