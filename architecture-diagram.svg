<text x="175" y="498" text-anchor="middle" class="boxSub">Per-page illustration generation</text>
<text x="175" y="516" text-anchor="middle" class="boxSub">Imagen 3 fallback · Vertex AI</text>

<!-- Cloud TTS -->
<rect x="310" y="450" width="230" height="85" rx="14" fill="#ec4899"/>
<text x="425" y="480" text-anchor="middle" class="boxLabel">Cloud Text-to-Speech</text>
<text x="425" y="498" text-anchor="middle" class="boxSub">Per-page narration audio</text>
<text x="425" y="516" text-anchor="middle" class="boxSub">Neural2 child-friendly voice</text>

